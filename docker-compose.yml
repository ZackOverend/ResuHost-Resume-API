# Profiles:
#   supabase (default) — only the api starts; database is hosted on Supabase
#   local              — api + db start; local Postgres container is used
#
# Set COMPOSE_PROFILES in your .env to match your DATABASE_TARGET.

services:
  api:
    build: .
    ports:
      - "2002:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        required: false

  db:
    profiles: ["local"]
    image: postgres:16
    environment:
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
      POSTGRES_DB: resume_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user -d resume_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
